<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>数据大屏 - 太平洋汽车网</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        body { margin: 0; padding: 20px; background: #f0f2f5; }
        h2 { text-align: center; }
        .chart { width: 80%; height: 500px; margin: 0 auto; background: white; border-radius: 8px; padding: 20px; }
    </style>
</head>
<body>
<h2>📊 品牌车型数量统计</h2>
<div id="brandChart" class="chart"></div>
<script>
    axios.get('http://localhost:5000/api/stats/brands')
        .then(res => {
            const data = res.data;
            const brands = data.map(item => item.brand);
            const counts = data.map(item => item.count);
            const chart = echarts.init(document.getElementById('brandChart'));
            chart.setOption({
                tooltip: { trigger: 'axis' },
                xAxis: { type: 'category', data: brands, axisLabel: { rotate: 45 } },
                yAxis: { type: 'value', name: '车型数量' },
                series: [{
                    type: 'bar',
                    data: counts,
                    itemStyle: { color: '#409EFF' }
                }]
            });
        })
        .catch(err => console.error(err));
</script>
</body>
</html>
