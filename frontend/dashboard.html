<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>数据大屏 - 太平洋汽车网</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <style>
        body { margin: 0; padding: 20px; background: #f0f2f5; font-family: 'Microsoft YaHei', sans-serif; }
        h2 { text-align: center; margin-bottom: 20px; }
        .dashboard-container { display: flex; flex-wrap: wrap; justify-content: space-around; }
        .chart-card {
            width: 45%;
            background: white;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        .chart-card h3 { text-align: center; margin-top: 0; }
        .chart { width: 100%; height: 400px; }
        @media (max-width: 768px) {
            .chart-card { width: 100%; }
        }
    </style>
</head>
<body>
<h2>🚗 太平洋汽车网 · 品牌热度与车型统计大屏</h2>
<div class="dashboard-container">
    <div class="chart-card">
        <h3>品牌车型数量排行</h3>
        <div id="brandBarChart" class="chart"></div>
    </div>
    <div class="chart-card">
        <h3>品牌平均用户评分</h3>
        <div id="ratingChart" class="chart"></div>
    </div>
</div>
<script>
/* global axios, echarts */
axios.get('http://localhost:5000/api/stats/brands')
    .then(res => {
        const data = res.data;  // 格式：[{brand, car_count, avg_rating}, ...]
        const brands = data.map(item => item.brand);
        const counts = data.map(item => item.car_count);
        const ratings = data.map(item => item.avg_rating || 0);

        // 柱状图：车型数量
        const barChart = echarts.init(document.getElementById('brandBarChart'));
        barChart.setOption({
            title: { text: '各品牌车型数量', left: 'center' },
            tooltip: { trigger: 'axis' },
            xAxis: { type: 'category', data: brands, axisLabel: { rotate: 45, interval: 0 } },
            yAxis: { type: 'value', name: '车型数量' },
            series: [{
                type: 'bar',
                data: counts,
                itemStyle: { color: '#409EFF' },
                label: { show: true, position: 'top' }
            }]
        });

        // 横向柱状图或折线图展示评分
        const ratingChart = echarts.init(document.getElementById('ratingChart'));
        ratingChart.setOption({
            title: { text: '品牌用户平均评分', left: 'center' },
            tooltip: { trigger: 'axis' },
            xAxis: { type: 'category', data: brands, axisLabel: { rotate: 45, interval: 0 } },
            yAxis: { type: 'value', name: '评分', min: 0, max: 5 },
            series: [{
                type: 'line',
                data: ratings,
                smooth: true,
                lineStyle: { color: '#e6a23c', width: 3 },
                symbol: 'circle',
                symbolSize: 8,
                label: { show: true, position: 'top' }
            }]
        });
    })
    .catch(err => {
        console.error('统计数据加载失败', err);
        document.body.innerHTML = '<p style="color:red;">后端API未启动或数据为空，请先运行爬虫和后端服务。</p>';
    });
</script>
</body>
</html>
